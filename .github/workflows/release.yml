name: Build release ZIP

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "zip_name=mv_attachment-${VERSION}-prestashop.zip" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          ZIP_NAME="${{ steps.ver.outputs.zip_name }}"
          mkdir -p _package/mv_attachment
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_package' \
            --exclude='*.zip' \
            --exclude='.gitignore' \
            . _package/mv_attachment/
          cd _package
          zip -r "../${ZIP_NAME}" mv_attachment/
          cd ..
          echo "=== ZIP obsah (prvých 40 riadkov) ==="
          unzip -l "${ZIP_NAME}" | head -40

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ver.outputs.zip_name }}
